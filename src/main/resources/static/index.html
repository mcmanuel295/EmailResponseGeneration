<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Response Generator</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.75rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Responsive Two-Column Layout */
        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .workspace {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            display: block;
            margin-bottom: 0.25rem;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        select {
            padding: 0.65rem 2rem 0.65rem 1rem;
            font-size: 0.95rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #fff;
            cursor: pointer;
            outline: none;
            min-width: 150px;
        }

        select:focus {
            border-color: var(--primary);
        }

        button {
            padding: 0.65rem 1.25rem;
            font-size: 0.95rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-generate {
            background-color: var(--primary);
            color: white;
        }

        .btn-generate:hover {
            background-color: var(--primary-hover);
        }

        .btn-copy {
            background-color: #f1f5f9;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            align-self: flex-start;
        }

        .btn-copy:hover {
            background-color: #e2e8f0;
        }

        .btn-copy.success {
            background-color: var(--success);
            color: white;
            border-color: var(--success);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Email Response Generator</h1>
        <p class="subtitle">Paste the incoming email, select your preferred tone, and generate a draft.</p>
    </header>

    <div class="workspace">
        <!-- Input Left Panel -->
        <div class="panel">
            <div>
                <label for="receivedEmail">Email Received</label>
                <textarea id="receivedEmail" placeholder="Paste the email you received here..."></textarea>
            </div>

            <div class="controls">
                <div>
                    <select id="toneSelect">
                        <option value="professional">Professional</option>
                        <option value="casual">Casual</option>
                        <option value="friendly">Friendly</option>
                        <option value="serious">Serious</option>
                    </select>
                </div>
                <!-- Hook this button up to your backend script -->
                <button class="btn-generate" onclick="generateResponse()">Generate Response</button>
            </div>
        </div>

        <!-- Output Right Panel -->
        <div class="panel">
            <div>
                <label for="generatedResponse">Generated Response</label>
                <textarea id="generatedResponse" placeholder="Your AI generated response will appear here..."></textarea>
            </div>

            <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">
                <!-- SVG Copy Icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy to Clipboard
            </button>
        </div>
    </div>
</div>

<script>
    // Placeholder function for your backend integration
    function generateResponse() {
        const receivedEmail = document.getElementById('receivedEmail').value;
        const selectedTone = document.getElementById('toneSelect').value;
        const outputBox = document.getElementById('generatedResponse');

        if (!receivedEmail.trim()) {
            alert('Please paste an incoming email first.');
            return;
        }

        outputBox.value = `[Loading...] Generating a ${selectedTone} response...`;

        // TODO: Add your fetch() API code here to call your backend pipeline.
        // Example simulation:
        setTimeout(() => {
            outputBox.value = `Dear Sender,\n\nThank you for reaching out. This is a placeholder sample showing a ${selectedTone} reply to your message.\n\nBest regards,\n[Your Name]`;
        }, 1000);
    }

    // Copy to Clipboard logic
    function copyToClipboard() {
        const responseText = document.getElementById('generatedResponse');
        const copyBtn = document.getElementById('copyBtn');

        if (!responseText.value.trim() || responseText.value.startsWith('[Loading...]')) {
            return;
        }

        responseText.select();
        responseText.setSelectionRange(0, 99999); // For mobile devices

        navigator.clipboard.writeText(responseText.value).then(() => {
            // Visual feedback on success
            const originalText = copyBtn.innerHTML;
            copyBtn.classList.add('success');
            copyBtn.innerHTML = '✓ Copied!';

            setTimeout(() => {
                copyBtn.classList.remove('success');
                copyBtn.innerHTML = originalText;
            }, 2000);
        }).catch(err => {
            console.error('Failed to copy text: ', err);
        });
    }
</script>

</body>
</html>
